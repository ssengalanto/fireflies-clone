name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage thresholds)
        run: pnpm test:coverage

      # Build to confirm the production bundle compiles and to feed T125's
      # `ANTHROPIC` leak check. ANTHROPIC_API_KEY is intentionally NOT set —
      # any compile-time inlining of the key would already be a security
      # regression.
      - name: Build
        run: pnpm build

      - name: Verify ANTHROPIC key never appears in the client bundle
        run: |
          set -e
          if grep -r 'ANTHROPIC' .next/static 2>/dev/null; then
            echo "::error::ANTHROPIC string found in client bundle — possible API key leak"
            exit 1
          fi
          echo "Client bundle is clean."

      # Playwright e2e — covers login, dashboard read + drill-in, and the
      # new-meeting modal with the custom DateTimePicker. Browsers are
      # installed with --with-deps to pick up the right shared libs on
      # ubuntu-latest. The Playwright config's webServer starts `pnpm dev`
      # on :3001 with the Basic Auth gate disabled (empty env vars).
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
